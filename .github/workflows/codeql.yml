name: "CodeQL Analysis"

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main]
  schedule:
    - cron: "25 14 * * 3" # Weekly Wednesday scan

jobs:
  analyze-java-kotlin:
    name: Analyze Java/Kotlin (Android)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Flutter SDK is required because settings.gradle.kts reads
      # local.properties for flutter.sdk, and app/build.gradle.kts
      # uses Flutter Gradle plugin + flutter.compileSdkVersion etc.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate local.properties and resolve dependencies
        run: flutter pub get

      - name: Build Android project
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"

  analyze-actions:
    name: Analyze GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"
