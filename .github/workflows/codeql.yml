name: "CodeQL Analysis"

on:
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday at 2am UTC

jobs:
  analyze-java-kotlin:
    name: Analyze Java/Kotlin (Android)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      # Flutter SDK is required because settings.gradle.kts reads
      # local.properties for flutter.sdk, and app/build.gradle.kts
      # uses Flutter Gradle plugin + flutter.compileSdkVersion etc.
      - name: Set up Flutter
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable

      - name: Generate local.properties and resolve dependencies
        run: flutter pub get

      - name: Build Android project
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          category: "/language:java-kotlin"

  analyze-actions:
    name: Analyze GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          category: "/language:actions"
