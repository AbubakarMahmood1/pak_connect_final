name: pak_connect
description: PakConnect UI-only app (no external plugins)

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_blue_plus: ^1.32.4
  flutter_blue_plus_windows: ^1.26.1
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  flutter_secure_storage: ^9.2.4
  hive_ce: ^2.10.1
  permission_handler: ^12.0.0
  flutter_background_service: ^5.1.0
  material_design_icons_flutter: ^7.0.7296
  convert: ^3.1.2
  intl: ^0.20.2
  geolocator: ^14.0.0
  logger: ^2.5.0
  path_provider_android: ^2.2.16
  uuid: ^4.5.1
  flutter_ble_peripheral: ^1.2.6
  flutter_local_notifications: ^19.1.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
